# This workflow will do a clean installation of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Update Release's

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: 20.x
    - name: Manifest and Download Links
      id: manifest_link_version
      env:
        VERSION: ${{github.event.release.tag_name}}
        URL: https://github.com/${{github.repository}}
        MANIFEST: https://github.com/${{github.repository}}/releases/latest/download/module.json
        DOWNLOAD: https://github.com/${{github.repository}}/releases/download/${{github.event.release.tag_name}}/module.zip
      run: |
        node -e '
          const fs = require("fs");
          const f = "./src/module.json";
          const m = JSON.parse(fs.readFileSync(f, "utf8"));
          m.version = process.env.VERSION;
          m.url = process.env.URL;
          m.manifest = process.env.MANIFEST;
          m.download = process.env.DOWNLOAD;
          fs.writeFileSync(f, JSON.stringify(m, null, 2) + "\n");
        '
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test
    - name: Archive dist folder
      uses: actions/upload-artifact@v7
      with:
        name: module-download
        path: dist/
    - name: Archive module json
      uses: actions/upload-artifact@v7
      with:
        name: module
        path: dist/module.json
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download module download file
        uses: actions/download-artifact@v8
        with:
          name: module-download
          path: module-download
      - name: Download module.json
        uses: actions/download-artifact@v8
        with:
          name: module
      # Create a zip file with all files required by the module to add to the release
      - run: (cd module-download; zip -r ../module.zip .)
      - name: Update Release with Files
        id: create_version_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.event.release.name }}
          draft: false
          prerelease: false
          make_latest: ${{ !github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            ./module.json
            ./module.zip
          tag_name: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
